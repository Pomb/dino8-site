<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino8 - Changelog</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    :root {
      --bg: #140C1C;
      --bg2: #1a1228;
      --text: #DEEED6;
      --dim: #8595A1;
      --accent: #6DC2CA;
      --green: #6DAA2C;
      --orange: #D27D2C;
      --red: #D04648;
      --blue: #597DCE;
      --yellow: #DAD45E;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      font-size: 15px;
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      padding: 2rem 0 1rem;
    }

    header a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
    }

    header a:hover { text-decoration: underline; }

    h1 {
      font-size: 1.5rem;
      color: var(--accent);
      text-align: center;
      margin: 1rem 0 0.5rem;
    }

    .release {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #2a2040;
    }

    .release:last-child { border-bottom: none; }

    .release h2 {
      font-size: 1.1rem;
      margin-bottom: 0.75rem;
    }

    .release h2 .version { color: var(--accent); }

    .release h2 .date {
      color: var(--dim);
      font-size: 0.85rem;
      font-weight: normal;
    }

    .release h3 {
      font-size: 0.85rem;
      color: var(--orange);
      margin: 0.75rem 0 0.25rem;
      text-transform: capitalize;
    }

    .release ul {
      list-style: none;
      padding: 0;
    }

    .release ul li {
      padding-left: 1.2em;
      position: relative;
      font-size: 0.9rem;
    }

    .release ul li::before {
      content: "-";
      position: absolute;
      left: 0;
      color: var(--dim);
    }

    code {
      background: var(--bg2);
      padding: 0.1em 0.3em;
      border-radius: 3px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="index.html">&larr; dino8</a>
      <h1>CHANGELOG</h1>
    </header>
    <div id="changelog"></div>
  </div>
  <script>
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderItem(text) {
      return escapeHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    fetch('https://dino8.pmlomb.workers.dev/changelog')
      .then(r => r.json())
      .then(data => {
        const html = data.entries.map(entry => {
          let sections = '';
          for (const [name, items] of Object.entries(entry.sections)) {
            sections += `<h3>${name}</h3><ul>${items.map(i => `<li>${renderItem(i)}</li>`).join('')}</ul>`;
          }
          return `<div class="release"><h2><span class="version">${escapeHtml(entry.version)}</span> <span class="date">&mdash; ${escapeHtml(entry.date)}</span></h2>${sections}</div>`;
        }).join('');
        document.getElementById('changelog').innerHTML = html;
      });
  </script>
</body>
</html>
